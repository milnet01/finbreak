# io.github.milnet01.finbreak.yaml — Flathub flatpak-builder manifest (FIBR-0159).
#
# Builds finbreak on the freedesktop runtime (§ 3.1) carrying its OWN pinned
# PySide6==6.11.1 wheel (which bundles Qt6) — so it needs no Qt from the runtime,
# only base system libs (glibc/libGL/fontconfig/xkbcommon/dbus). The pinned wheel
# closure is pip-installed into /app from python3-deps.yaml (§ 3.2); the app itself
# is pip-installed from its own git clone. This is the SAME pinned closure the gate
# tests — never a substituted Qt/SQLCipher (FIBR-0159 § 3.1).
#
# The sandbox is deliberately MINIMAL for a finance app (§ 3.4): NO --share=network
# (app networking unreachable), NO --filesystem=* (file I/O goes through the
# xdg-desktop-portal chooser, which grants only the file the user picks), NO
# --talk-name=* (the KWin window-centering call is disabled in code instead — the
# _kde_wayland() Flatpak gate, INV-8 — rather than widening the D-Bus surface).
#
# SUBMISSION NOTE: the finbreak module's git source is pinned to a real release
# (tag + immutable commit, § 3.8 / INV-4). Re-pin `tag:`/`commit:` to the newest
# release before a Flathub PR (and regenerate python3-deps.yaml if the closure
# changed) — see packaging/flatpak/README.md.
id: io.github.milnet01.finbreak
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: finbreak

# --- The security contract (§ 3.4). Every entry is load-bearing; the deliberate
#     absences (network / filesystem / talk-name) ARE the finance-app security
#     story. INV-2 pins this to an enumerated allowlist, so adding any permission
#     fails the gate.
finish-args:
  - --socket=wayland          # Wayland display
  - --socket=fallback-x11     # X11 only when Wayland is absent
  - --share=ipc               # X11 shared-memory (XShm); harmless, standard
  - --device=dri              # GPU accel for Qt; falls back to software render

# Strip build cruft the closure drops into /app (idiomatic Flathub cleanup).
cleanup:
  - '*.pyc'
  - /lib/python*/site-packages/**/__pycache__

modules:
  # 1) The pinned dependency closure — sha256-pinned wheels + the one sdist
  #    (ofxparse), generated by generate-pip-sources.sh (§ 3.6). Single cp313 ABI
  #    (the SDK 25.08 python is 3.13). Installed with `pip3 install --no-index`
  #    against the fetched local files, so no package index is consulted.
  - python3-deps.yaml

  # 2) finbreak itself — pip-installed from its own git clone (deps already in
  #    /app), which drops the /app/bin/finbreak console script (= `command:`), then
  #    installs the reused FIBR-0155 desktop assets from the SAME clone (§ 3.2/3.3
  #    — a git clone survives standalone submission; a ../obs/… disk path would not).
  - name: finbreak
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --no-index --prefix=${FLATPAK_DEST} .
      - install -Dm644 packaging/obs/io.github.milnet01.finbreak.desktop
        ${FLATPAK_DEST}/share/applications/io.github.milnet01.finbreak.desktop
      - install -Dm644 packaging/obs/io.github.milnet01.finbreak.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/io.github.milnet01.finbreak.metainfo.xml
      - |
        for s in 16 24 32 48 64 128 256 512; do
          install -Dm644 "assets/icon/finbreak-${s}.png" \
            "${FLATPAK_DEST}/share/icons/hicolor/${s}x${s}/apps/io.github.milnet01.finbreak.png"
        done
    sources:
      - type: git
        url: https://github.com/milnet01/finbreak.git
        tag: v0.1.16
        commit: aae888b6f89b019af5f1049ccee4dc13cb47cda9

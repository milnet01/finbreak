# gitleaks config for finbreak's working-tree secret scan (FIBR-0001 INV-1/INV-5).
#
# `gitleaks dir .` scans files on disk, so it would otherwise crawl a local
# virtualenv and VCS internals. Extend the default ruleset and ignore paths
# that are not project source. This narrows WHERE we scan, not WHAT counts as a
# secret — the full default detector set still applies to source files.
[extend]
useDefault = true

[allowlist]
description = "Ignore virtualenvs, VCS internals, and build output"
paths = [
  '''\.venv/''',
  '''\.git/''',
  '''dist/''',
  '''build/''',
  # flatpak-builder outputs (FIBR-0159): the built app tree (.build/.repo) and the
  # download/build cache (.flatpak-builder/) bundle hundreds of MB of third-party
  # wheels + native libs whose high-entropy strings trip the default detectors.
  # They are git-ignored transient build output (packaging/flatpak/.gitignore) —
  # same rationale as dist/ + build/. The committed manifest/deps/scripts are still
  # scanned (and clean).
  '''\.flatpak-builder/''',
  '''packaging/flatpak/\.build/''',
  '''packaging/flatpak/\.repo/''',
  # release/ holds ONLY the maintainer's local, git-ignored Ed25519 signing
  # *private* key (scripts/gen-signing-key.py). `gitleaks dir .` scans disk
  # regardless of .gitignore, so it would flag that key on every push. It can
  # never be committed (git-ignored + the INV-14 test scans tracked files), so
  # scanning this local-only path is noise — same rationale as .venv/ (FIBR-0054).
  '''release/''',
]
# The default `generic-api-key` rule matches the high-entropy PySide6 API name
# `shiboken6.isValid` where the FIBR-0051 spec / tests cite it in prose (the
# "is this QObject deleted?" idiom). It is a documented public identifier, not a
# secret — allowlist the exact string, not a broad path (FIBR-0051).
regexes = [
  '''shiboken6\.isValid''',
  # `cipher_compatibility=4` is a SQLCipher PRAGMA *compatibility level* (the
  # integer 4 — the on-disk cipher profile), cited throughout the FIBR-0015 spec
  # next to words like "key"/"raw-hex-keyed", which trips the default
  # `generic-api-key` rule. The value is a fixed public constant, not a secret —
  # allowlist the exact token, not a broad path (same pattern as shiboken6.isValid,
  # FIBR-0015).
  '''cipher_compatibility=4''',
]

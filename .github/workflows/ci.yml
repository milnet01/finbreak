name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    name: lint + security + tests
    runs-on: ubuntu-24.04
    # Run INSIDE the same image scripts/ci-docker.sh uses, so a local
    # `scripts/ci-docker.sh` run and this job install an identical environment
    # and run the identical gate — they cannot drift (FIBR-0001 INV-2). The
    # image ships Python 3.12, so no setup-python step is needed.
    container: python:3.12-slim-bookworm
    steps:
      # actions/checkout shells out to git, which the slim image lacks.
      - name: Install git for checkout
        run: apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates

      - uses: actions/checkout@v7

      # System libs (PySide6's OS deps) + gitleaks + Python deps. Shared with
      # scripts/ci-docker.sh — one definition, so local and CI can't diverge.
      - name: Prepare CI environment
        run: ./scripts/ci-setup.sh

      # Single source of truth for the gate stages: the same script a developer
      # runs locally (INV-2).
      - name: Run the gate
        run: ./scripts/ci-local.sh

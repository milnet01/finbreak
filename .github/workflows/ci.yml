name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    name: lint + security + tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # PEP 735 `--group` needs pip >= 25.1; the runner's bundled pip may be older.
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dev dependency group
        run: python -m pip install --group dev

      - name: Install gitleaks
        run: |
          version=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # Single source of truth: CI runs the exact same stages as a local
      # checkout by invoking the script, not by re-listing them (INV-2).
      - name: Run the gate
        run: ./scripts/ci-local.sh

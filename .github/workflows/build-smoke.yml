name: build-smoke

# FIBR-0003 — the opt-in bundling smoke-test. NOT run on every push (that would
# make the fast gate slow); it runs on demand and weekly, freezing the stub into
# a PyInstaller onefile + AppImage and launching each in a Python-free container.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # weekly, Monday 04:00 UTC

permissions:
  contents: read

jobs:
  build-smoke:
    name: freeze + clean-room launch
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      # setup-python pins the host interpreter to 3.12 (ci-setup.sh assumes
      # python3.12 + pip are already present, as they are inside the slim image
      # ci.yml uses). ubuntu-24.04 ships 3.12, but pin it explicitly.
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      # The SAME environment prep as ci.yml and scripts/ci-docker.sh — system
      # libs (the Qt OS deps the FIBR-0003 self-test guard needs to import
      # PySide6 in pytest) + gitleaks + the Python dependency groups. Calling the
      # single source of truth (not inlining a subset) keeps this job from
      # drifting from the gate — e.g. a PySide6 bump that adds a system lib lands
      # in ci-setup.sh once and reaches all three callers.
      - name: Prepare CI environment
        run: ./scripts/ci-setup.sh

      # Runs the full gate PLUS the build+clean-room integration test. The
      # runner's Docker is used (no podman); build-smoke.sh falls back to it.
      - name: Run the gate with the build smoke-test
        run: ./scripts/ci-local.sh --build
